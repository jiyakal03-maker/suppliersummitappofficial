<svg width="400" height="900" viewBox="0 0 400 900" xmlns="http://www.w3.org/2000/svg">
  <!--
    EDITABLE ROAD ASSET
    ====================
    - "waypoints" group below holds small circles marking the control points
      of the road. Drag these in Illustrator/Figma/Inkscape to reshape the curve.
    - The road itself is built from THREE stacked paths:
        1. #road-shadow  (soft drop shadow, offset down/right)
        2. #road-bed     (the asphalt-gray road surface)
        3. #road-line    (the dashed yellow center line)
      All three share the same "d" attribute — if you edit the curve,
      copy the same new "d" value into all three paths (and #road-hitbox
      if you keep one for pin placement math).
    - Waypoints trace a top-to-bottom S-curve so it reads naturally as a
      vertical timeline. Add/remove circles + adjust the path's Q/T commands
      to change the number of "bends."
  -->

  <defs>
    <style>
      .waypoint { fill: #F5D400; stroke: #0A0A0B; stroke-width: 2; }
      .waypoint-label { font-family: monospace; font-size: 11px; fill: #0A0A0B; }
    </style>
  </defs>

  <rect x="0" y="0" width="400" height="900" fill="#0A0A0B" />

  <!-- 1. shadow -->
  <path
    id="road-shadow"
    d="M 60 40 Q 60 40 130 110 T 90 260 Q 90 260 220 330 T 260 480 Q 260 480 120 560 T 150 700 Q 150 700 300 780 T 340 860"
    fill="none"
    stroke="#000000"
    stroke-opacity="0.35"
    stroke-width="48"
    stroke-linecap="round"
    transform="translate(4,6)"
  />

  <!-- 2. road bed -->
  <path
    id="road-bed"
    d="M 60 40 Q 60 40 130 110 T 90 260 Q 90 260 220 330 T 260 480 Q 260 480 120 560 T 150 700 Q 150 700 300 780 T 340 860"
    fill="none"
    stroke="#242427"
    stroke-width="48"
    stroke-linecap="round"
  />

  <!-- 3. dashed center line -->
  <path
    id="road-line"
    d="M 60 40 Q 60 40 130 110 T 90 260 Q 90 260 220 330 T 260 480 Q 260 480 120 560 T 150 700 Q 150 700 300 780 T 340 860"
    fill="none"
    stroke="#F5D400"
    stroke-width="3.5"
    stroke-dasharray="16 14"
    stroke-linecap="round"
  />

  <!-- Waypoint markers (visual reference only — delete before shipping) -->
  <g id="waypoints">
    <circle class="waypoint" cx="60" cy="40" r="6" />
    <text class="waypoint-label" x="70" y="36">1</text>

    <circle class="waypoint" cx="130" cy="110" r="6" />
    <text class="waypoint-label" x="140" y="106">2</text>

    <circle class="waypoint" cx="90" cy="260" r="6" />
    <text class="waypoint-label" x="100" y="256">3</text>

    <circle class="waypoint" cx="220" cy="330" r="6" />
    <text class="waypoint-label" x="230" y="326">4</text>

    <circle class="waypoint" cx="260" cy="480" r="6" />
    <text class="waypoint-label" x="270" y="476">5</text>

    <circle class="waypoint" cx="120" cy="560" r="6" />
    <text class="waypoint-label" x="130" y="556">6</text>

    <circle class="waypoint" cx="150" cy="700" r="6" />
    <text class="waypoint-label" x="160" y="696">7</text>

    <circle class="waypoint" cx="300" cy="780" r="6" />
    <text class="waypoint-label" x="310" y="776">8</text>

    <circle class="waypoint" cx="340" cy="860" r="6" />
    <text class="waypoint-label" x="315" y="880">9</text>
  </g>
</svg>
